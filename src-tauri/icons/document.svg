<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Document page shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <!-- Gradient for page -->
    <linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <!-- Fold gradient -->
    <linearGradient id="foldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <!-- Atom gradients (from favicon) -->
    <linearGradient id="atomAmber" gradientUnits="userSpaceOnUse" x1="0" y1="-6" x2="12" y2="6">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="atomCenter" gradientUnits="userSpaceOnUse" x1="-10" y1="-10" x2="10" y2="10">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Document page shape with folded corner -->
  <path d="M96 32 h248 l72 72 v376 a16 16 0 0 1 -16 16 H112 a16 16 0 0 1 -16 -16 V48 a16 16 0 0 1 16 -16 z"
        fill="url(#pageGrad)" stroke="#94a3b8" stroke-width="4" filter="url(#shadow)"/>

  <!-- Folded corner -->
  <path d="M344 32 v56 a16 16 0 0 0 16 16 h56 z"
        fill="url(#foldGrad)" stroke="#94a3b8" stroke-width="4" stroke-linejoin="round"/>

  <!-- CatGO logo centered in the page -->
  <g transform="translate(256, 280)">
    <!-- Bonds (lines connecting atoms) -->
    <g fill="none" stroke="#64748b" stroke-width="4.5" stroke-linecap="round">
      <!-- Vertical bond: top to center -->
      <line x1="0" y1="-68" x2="0" y2="-26"/>
      <!-- Vertical bond: center to bottom -->
      <line x1="0" y1="26" x2="0" y2="68"/>
      <!-- Horizontal bond: left to center -->
      <line x1="-68" y1="0" x2="-26" y2="0"/>
      <!-- Horizontal bond: center to right -->
      <line x1="26" y1="0" x2="68" y2="0"/>
    </g>

    <!-- Diagonal bonds to small atoms -->
    <g fill="none" stroke="#64748b" stroke-width="4.5" stroke-linecap="round">
      <line x1="18" y1="18" x2="54" y2="54"/>
      <line x1="-18" y1="-18" x2="-54" y2="-54"/>
    </g>

    <!-- Outer atoms (amber) -->
    <g stroke="#d97706" stroke-width="3">
      <!-- Top -->
      <circle cx="0" cy="-80" r="16" fill="url(#atomAmber)"/>
      <!-- Bottom -->
      <circle cx="0" cy="80" r="16" fill="url(#atomAmber)"/>
      <!-- Left -->
      <circle cx="-80" cy="0" r="16" fill="url(#atomAmber)"/>
      <!-- Right -->
      <circle cx="80" cy="0" r="16" fill="url(#atomAmber)"/>
    </g>

    <!-- Small diagonal atoms (amber) -->
    <g stroke="#d97706" stroke-width="2.5">
      <circle cx="62" cy="62" r="10" fill="url(#atomAmber)"/>
      <circle cx="-62" cy="-62" r="10" fill="url(#atomAmber)"/>
    </g>

    <!-- Center atom (blue-purple) -->
    <circle cx="0" cy="0" r="24" fill="url(#atomCenter)" stroke="#7c3aed" stroke-width="3.5"/>
  </g>

  <!-- File extension label area -->
  <rect x="96" y="430" width="320" height="40" rx="6" fill="#7c3aed" opacity="0.9"/>
  <text x="256" y="457" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="700" fill="white" letter-spacing="2">CATGO</text>
</svg>
