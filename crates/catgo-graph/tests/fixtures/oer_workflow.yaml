id: oer_workflow_v1
version: "1.0"
description: "Evaluate OER activity on a catalyst surface"

inputs_schema:
  type: object
  required:
    - surface
  properties:
    surface:
      type: string
      description: Catalyst surface descriptor, e.g. Pt(111)
    charge:
      type: number
      default: 0.0
    spin:
      type: integer
      default: 1

outputs:
  - name: oer_overpotential
    source: "${nodes.evaluate_oer.outputs.overpotential}"
  - name: gibbs_summary
    source: "${nodes.compute_gibbs.outputs.summary}"

nodes:
  - id: build_surface
    tool: generate_surface
    depends_on: []
    input_bindings:
      surface: "${inputs.surface}"
    retry_policy:
      max_attempts: 1
      backoff:
        type: none
      retry_on: []
    timeout_seconds: 300
    execution_mode: local
    metadata:
      stage: structure

  - id: enumerate_adsorbates
    tool: enumerate_adsorbates
    depends_on:
      - build_surface
    input_bindings:
      adsorbates:
        - OH
        - O
        - OOH
    retry_policy:
      max_attempts: 1
      backoff:
        type: none
      retry_on: []
    timeout_seconds: 300
    execution_mode: local
    metadata:
      stage: enumeration

  - id: relax_OH
    tool: run_vasp_relax
    depends_on:
      - enumerate_adsorbates
    input_bindings:
      adsorbate: OH
    retry_policy:
      max_attempts: 3
      backoff:
        type: fixed
        seconds: 60
      retry_on:
        - tool_invocation
        - external_process
        - scf_non_convergence
        - ionic_non_convergence
    timeout_seconds: 86400
    execution_mode: hpc
    metadata:
      stage: relaxation

  - id: relax_O
    tool: run_vasp_relax
    depends_on:
      - enumerate_adsorbates
    input_bindings:
      adsorbate: O
    retry_policy:
      max_attempts: 3
      backoff:
        type: fixed
        seconds: 60
      retry_on:
        - tool_invocation
        - external_process
        - scf_non_convergence
        - ionic_non_convergence
    timeout_seconds: 86400
    execution_mode: hpc
    metadata:
      stage: relaxation

  - id: relax_OOH
    tool: run_vasp_relax
    depends_on:
      - enumerate_adsorbates
    input_bindings:
      adsorbate: OOH
    retry_policy:
      max_attempts: 3
      backoff:
        type: fixed
        seconds: 60
      retry_on:
        - tool_invocation
        - external_process
        - scf_non_convergence
        - ionic_non_convergence
    timeout_seconds: 86400
    execution_mode: hpc
    metadata:
      stage: relaxation

  - id: freq_OH
    tool: run_vasp_freq
    depends_on:
      - relax_OH
    input_bindings:
      adsorbate: OH
    retry_policy:
      max_attempts: 2
      backoff:
        type: fixed
        seconds: 60
      retry_on:
        - tool_invocation
        - external_process
    timeout_seconds: 86400
    execution_mode: hpc
    metadata:
      stage: frequency

  - id: freq_O
    tool: run_vasp_freq
    depends_on:
      - relax_O
    input_bindings:
      adsorbate: O
    retry_policy:
      max_attempts: 2
      backoff:
        type: fixed
        seconds: 60
      retry_on:
        - tool_invocation
        - external_process
    timeout_seconds: 86400
    execution_mode: hpc
    metadata:
      stage: frequency

  - id: freq_OOH
    tool: run_vasp_freq
    depends_on:
      - relax_OOH
    input_bindings:
      adsorbate: OOH
    retry_policy:
      max_attempts: 2
      backoff:
        type: fixed
        seconds: 60
      retry_on:
        - tool_invocation
        - external_process
    timeout_seconds: 86400
    execution_mode: hpc
    metadata:
      stage: frequency

  - id: compute_gibbs
    tool: compute_gibbs_free_energy
    depends_on:
      - freq_OH
      - freq_O
      - freq_OOH
    input_bindings:
      temperature: 298.15
    retry_policy:
      max_attempts: 1
      backoff:
        type: none
      retry_on: []
    timeout_seconds: 300
    execution_mode: local
    metadata:
      stage: thermodynamics

  - id: evaluate_oer
    tool: compute_oer_overpotential
    depends_on:
      - compute_gibbs
    input_bindings:
      method: standard
    retry_policy:
      max_attempts: 1
      backoff:
        type: none
      retry_on: []
    timeout_seconds: 300
    execution_mode: local
    metadata:
      stage: evaluation
